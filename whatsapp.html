<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GNSIS WhatsApp Widget</title>
<style>
/* ═══ GNSIS Cyberpunk Neón ═══ */
:root {
  --bg: #0a0519;
  --bg2: #120a28;
  --bg3: #191037;
  --bg4: #1f1545;
  --text: #e6f0ff;
  --dim: #968cb4;
  --muted: #5a4e78;
  --cyan: #00ffdc;
  --blue: #00dcff;
  --purple: #b464ff;
  --pink: #ff00c8;
  --green: #00ff8c;
  --red: #ff3366;
  --orange: #ff9500;
  --border: rgba(180,100,255,0.15);
  --card: rgba(18,10,40,0.85);
  --glow-c: 0 0 8px rgba(0,255,220,0.3);
  --glow-p: 0 0 8px rgba(180,100,255,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); overflow:hidden; height:100vh; }
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

/* ═══ Layout ═══ */
#app { height:100vh; display:flex; flex-direction:column; }

/* ═══ Header ═══ */
.header {
  display:flex; align-items:center; gap:10px; padding:10px 14px;
  background:linear-gradient(135deg, var(--bg3), var(--bg2));
  border-bottom:1px solid var(--border);
  box-shadow:0 2px 16px rgba(0,255,220,0.06);
  min-height:52px;
}
.header-logo { font-size:24px; }
.header-title { font-size:15px; font-weight:700; color:var(--cyan); text-shadow:0 0 12px rgba(0,255,220,0.25); flex:1; }
.header-sub { font-size:11px; color:var(--dim); }
.header-badge {
  padding:3px 10px; border-radius:12px; font-size:11px; font-weight:700;
  animation:pulse 2s infinite;
}
.badge-online { background:rgba(0,255,140,0.15); color:var(--green); border:1px solid rgba(0,255,140,0.3); }
.badge-offline { background:rgba(255,51,102,0.15); color:var(--red); border:1px solid rgba(255,51,102,0.3); }
.badge-qr { background:rgba(0,255,220,0.15); color:var(--cyan); border:1px solid rgba(0,255,220,0.3); }
.notif-count {
  min-width:22px; height:22px; border-radius:11px; background:var(--pink);
  color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center;
  justify-content:center; padding:0 6px; box-shadow:0 0 8px rgba(255,0,200,0.4);
}

/* ═══ QR Screen ═══ */
.qr-screen {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:20px; padding:20px;
}
.qr-box {
  background:#fff; border-radius:12px; padding:12px; display:inline-block;
  box-shadow:0 0 30px rgba(0,255,220,0.15);
}
.qr-box img { width:200px; height:200px; border-radius:6px; }
.qr-box canvas { border-radius:6px; }
.qr-placeholder {
  width:200px; height:200px; display:flex; align-items:center; justify-content:center;
  background:#f0f0f0; border-radius:6px; color:#666; font-size:14px;
}
.qr-title { font-size:18px; font-weight:700; color:var(--cyan); text-shadow:0 0 16px rgba(0,255,220,0.3); }
.qr-steps { font-size:12px; color:var(--dim); line-height:1.8; text-align:left; max-width:260px; }
.qr-steps b { color:var(--cyan); }
.qr-input-row { display:flex; gap:8px; width:100%; max-width:280px; }
.qr-input {
  flex:1; padding:10px 14px; background:var(--bg3); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-size:13px; outline:none;
}
.qr-input:focus { border-color:var(--cyan); box-shadow:var(--glow-c); }
.qr-btn {
  padding:10px 18px; background:linear-gradient(135deg,var(--cyan),var(--blue));
  color:var(--bg); font-weight:700; font-size:13px; border:none; border-radius:8px;
  cursor:pointer; box-shadow:var(--glow-c); transition:all 0.2s;
}
.qr-btn:hover { transform:scale(1.03); }
.qr-btn:disabled { opacity:0.5; cursor:not-allowed; }
.qr-status { font-size:12px; color:var(--green); animation:pulse 1.5s infinite; }
.qr-error { font-size:12px; color:var(--red); }

/* ═══ Chat Screen ═══ */
.chat-screen { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* Tabs */
.tabs {
  display:flex; border-bottom:1px solid var(--border); background:var(--bg);
}
.tab {
  flex:1; padding:8px 0; text-align:center; font-size:11px; font-weight:600;
  cursor:pointer; border-bottom:2px solid transparent; color:var(--dim);
  transition:all 0.15s;
}
.tab.active { color:var(--cyan); border-bottom-color:var(--cyan); text-shadow:0 0 8px rgba(0,255,220,0.3); }
.tab:hover { color:var(--text); }
.tab-icon { font-size:14px; display:block; margin-bottom:2px; }

/* Mensajes / Lista */
.msg-list { flex:1; overflow-y:auto; padding:0; }

.msg-item {
  display:flex; align-items:flex-start; gap:10px; padding:10px 14px;
  border-bottom:1px solid rgba(180,100,255,0.06);
  cursor:pointer; transition:background 0.12s;
  animation:slideIn 0.2s ease;
}
.msg-item:hover { background:rgba(0,255,220,0.04); }
.msg-item.unread { background:rgba(255,0,200,0.03); border-left:3px solid var(--pink); }
.msg-item.unread .msg-name { color:var(--text); font-weight:700; }

.msg-avatar {
  width:42px; height:42px; border-radius:50%; background:var(--bg3);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0; border:1px solid var(--border);
  position:relative;
}
.msg-avatar .online-dot {
  position:absolute; bottom:1px; right:1px; width:10px; height:10px;
  border-radius:50%; background:var(--green); border:2px solid var(--bg);
  box-shadow:0 0 4px var(--green);
}
.msg-body { flex:1; min-width:0; }
.msg-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:2px; }
.msg-name { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.msg-time { font-size:10px; color:var(--muted); flex-shrink:0; margin-left:8px; }
.msg-bottom { display:flex; justify-content:space-between; align-items:center; }
.msg-preview {
  font-size:12px; color:var(--dim); white-space:nowrap; overflow:hidden;
  text-overflow:ellipsis; flex:1;
}
.msg-badge {
  min-width:18px; height:18px; border-radius:9px; background:var(--pink);
  color:#fff; font-size:10px; font-weight:700; display:flex;
  align-items:center; justify-content:center; padding:0 5px;
  box-shadow:0 0 6px rgba(255,0,200,0.4); flex-shrink:0; margin-left:6px;
}

/* Chat detalle */
.chat-detail { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.chat-header {
  display:flex; align-items:center; gap:10px; padding:8px 14px;
  background:var(--bg3); border-bottom:1px solid var(--border);
}
.chat-back { font-size:18px; cursor:pointer; padding:4px; }
.chat-name { font-size:14px; font-weight:600; flex:1; }
.chat-status { font-size:11px; color:var(--dim); }

.bubble-list { flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:4px; }
.bubble {
  max-width:80%; padding:6px 10px 3px; border-radius:8px;
  font-size:13px; line-height:1.4; animation:fadeIn 0.15s ease;
  word-wrap:break-word;
}
.bubble.sent {
  align-self:flex-end; background:rgba(0,255,140,0.07);
  border:1px solid rgba(0,255,140,0.2); border-top-right-radius:2px;
}
.bubble.recv {
  align-self:flex-start; background:rgba(180,100,255,0.07);
  border:1px solid rgba(180,100,255,0.2); border-top-left-radius:2px;
}
.bubble-sender { font-size:11px; font-weight:600; color:var(--purple); margin-bottom:1px; }
.bubble-meta { display:flex; justify-content:flex-end; gap:4px; margin-top:1px; }
.bubble-time { font-size:9px; color:var(--muted); }
.bubble-ack { font-size:10px; color:var(--muted); }
.bubble-ack.read { color:var(--blue); }

.date-pill {
  align-self:center; padding:3px 12px; border-radius:16px;
  background:rgba(180,100,255,0.08); border:1px solid rgba(180,100,255,0.12);
  font-size:11px; color:var(--dim); margin:8px 0;
}

/* Composer */
.composer {
  display:flex; align-items:center; gap:6px; padding:6px 10px;
  background:var(--bg3); border-top:1px solid var(--border);
}
.composer input {
  flex:1; padding:8px 12px; background:var(--bg); border:1px solid var(--border);
  border-radius:18px; color:var(--text); font-size:13px; outline:none;
}
.composer input:focus { border-color:var(--cyan); }
.composer .send-btn {
  width:34px; height:34px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:16px; background:linear-gradient(135deg,var(--cyan),var(--blue));
  color:var(--bg); border:none; cursor:pointer; box-shadow:var(--glow-c);
  transition:all 0.15s; flex-shrink:0;
}
.composer .send-btn:disabled { opacity:0.4; box-shadow:none; }

/* Empty */
.empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--dim); padding:20px; }
.empty-icon { font-size:40px; opacity:0.3; }
.empty-text { font-size:13px; text-align:center; }

/* Config bar */
.config-bar {
  display:flex; align-items:center; gap:6px; padding:6px 12px;
  background:var(--bg3); border-top:1px solid var(--border); font-size:11px; color:var(--dim);
}
.config-bar .sync-dot { width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 4px var(--green); }
.config-bar .sync-label { flex:1; }
.config-bar button {
  padding:3px 8px; border:1px solid var(--border); border-radius:4px;
  background:transparent; color:var(--dim); font-size:10px; cursor:pointer;
}
.config-bar button:hover { color:var(--cyan); border-color:var(--cyan); }

/* Animations */
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.6;} }
@keyframes slideIn { from{transform:translateY(8px);opacity:0;} to{transform:translateY(0);opacity:1;} }
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
@keyframes spin { to{transform:rotate(360deg);} }
.spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--cyan); border-radius:50%; animation:spin 0.8s linear infinite; }

/* Responsive */
@media (max-width:400px) {
  .msg-avatar { width:36px; height:36px; font-size:15px; }
  .msg-name { font-size:13px; }
  .qr-box img, .qr-placeholder { width:160px; height:160px; }
}
</style>
</head>
<body>
<div id="app"></div>

<script>
/**
 * GNSIS WhatsApp Widget v1.0
 * Widget embebible para Monday.com Workdoc
 * Fase 1: QR → Fase 2: Notificaciones nativas via Monday API
 */

// ═══ Configuración ═══
const CONFIG = {
  // Monday.com API (nativo, sin servicios externos)
  MONDAY_API: 'https://api.monday.com/v2',
  MONDAY_TOKEN: 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjYyNzI1MjIxOSwiYWFpIjoxMSwidWlkIjoxMDA0NDkyMzcsImlhZCI6IjIwMjYtMDMtMDFUMTM6MjQ6NDUuNTg5WiIsInBlciI6Im1lOndyaXRlIiwiYWN0aWQiOjM0MDE2OTQzLCJyZ24iOiJ1c2UxIn0.hbIObBfJStKk_fUnkcPoTDou8A6GCHHhTpnPm3Uq4Us',

  // WhatsApp Hub backend (solo para QR y enviar mensajes)
  HUB_URL: 'http://localhost:3200',
  HUB_KEY: 'gnsis-wahub-2026',

  // Board ID de WhatsApp Conversaciones (se llena después del setup)
  WA_BOARD_ID: localStorage.getItem('wa_board_id') || '',

  // Polling
  POLL_INTERVAL: 3000,
  POLL_UPDATES: 5000,
};

// ═══ Estado ═══
const state = {
  phase: 'init', // init | qr | auth | chat
  sessionId: localStorage.getItem('wa_session_id') || '',
  connected: false,
  chats: [],
  activeChat: null,
  messages: {},
  unreadTotal: 0,
  lastUpdateCheck: new Date().toISOString(),
  tab: 'recent', // recent | all | groups
  boardId: CONFIG.WA_BOARD_ID,
  boardItems: [],
  newUpdates: [],
  error: null,
};

// ═══ Monday.com API Nativa ═══
async function mondayQuery(query, variables = {}) {
  const body = { query };
  if (Object.keys(variables).length) body.variables = variables;
  const res = await fetch(CONFIG.MONDAY_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': CONFIG.MONDAY_TOKEN },
    body: JSON.stringify(body),
  });
  const json = await res.json();
  if (json.errors?.length) throw new Error(json.errors[0].message);
  return json.data;
}

// Obtener items del board WhatsApp Conversaciones con sus Updates
async function fetchConversations() {
  if (!state.boardId) return [];
  try {
    const data = await mondayQuery(`
      query ($boardId: [ID!]!) {
        boards(ids: $boardId) {
          items_page(limit: 50, query_params: { order_by: [{column_id: "__last_updated__", direction: desc}] }) {
            items {
              id name created_at updated_at
              column_values { id text value type }
              updates(limit: 3) {
                id body text_body created_at
                creator { id name }
              }
            }
          }
        }
      }
    `, { boardId: [state.boardId] });
    return data.boards[0]?.items_page?.items || [];
  } catch (err) {
    console.error('[Monday] Error:', err.message);
    return [];
  }
}

// Obtener updates recientes de un item específico
async function fetchItemUpdates(itemId, limit = 20) {
  try {
    const data = await mondayQuery(`
      query ($itemId: [ID!]!, $limit: Int!) {
        items(ids: $itemId) {
          updates(limit: $limit) {
            id body text_body created_at
            creator { id name }
          }
        }
      }
    `, { itemId: [String(itemId)], limit });
    return data.items[0]?.updates || [];
  } catch (err) {
    console.error('[Monday] Error updates:', err.message);
    return [];
  }
}

// Crear update (enviar respuesta desde el widget)
async function sendReply(itemId, text) {
  try {
    await mondayQuery(`
      mutation ($itemId: ID!, $body: String!) {
        create_update(item_id: $itemId, body: $body) { id }
      }
    `, { itemId: String(itemId), body: `[WAHUB-REPLY] ${text}` });
    return true;
  } catch (err) {
    console.error('[Monday] Error reply:', err.message);
    return false;
  }
}

// ═══ Hub API (solo QR + status) ═══
async function hubAPI(method, path, body) {
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json', 'x-api-key': CONFIG.HUB_KEY } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`${CONFIG.HUB_URL}${path}`, opts);
    return await res.json();
  } catch { return { ok: false, error: 'Hub no disponible' }; }
}

async function checkHubStatus() {
  const data = await hubAPI('GET', '/api/health');
  return data.ok && data.sessions?.ready > 0;
}

async function createSession(clientId) {
  return await hubAPI('POST', '/api/sessions', { clientId });
}

async function getQR(clientId) {
  return await hubAPI('GET', `/api/sessions/${clientId}/qr`);
}

async function getSessionStatus(clientId) {
  return await hubAPI('GET', `/api/sessions/${clientId}/status`);
}

// ═══ Helpers ═══
function getColumnText(item, colId) {
  const col = item.column_values?.find(c => c.id === colId);
  return col?.text || '';
}

function parseUpdateMessage(update) {
  const body = update.text_body || update.body || '';
  // Extraer dirección y contenido del formato [WAHUB]
  const isBot = body.includes('[WAHUB]');
  const isReply = body.includes('[WAHUB-REPLY]');
  let clean = body.replace('[WAHUB]', '').replace('[WAHUB-REPLY]', '').trim();
  // Limpiar HTML
  clean = clean.replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ').replace(/&amp;/g, '&').trim();

  const isIncoming = clean.includes('📥');
  const isOutgoing = clean.includes('📤') || isReply;

  return {
    id: update.id,
    body: clean,
    createdAt: update.created_at,
    creator: update.creator?.name || 'Sistema',
    isIncoming,
    isOutgoing,
    isBot,
    isReply,
  };
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'ahora';
  if (mins < 60) return `${mins}m`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h`;
  const days = Math.floor(hrs / 24);
  return `${days}d`;
}

function formatTime(dateStr) {
  return new Date(dateStr).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', hour12: false });
}

// ═══ Render Engine ═══
function render() {
  const app = document.getElementById('app');

  if (state.phase === 'init' || state.phase === 'qr') {
    app.innerHTML = renderQRScreen();
  } else if (state.phase === 'chat') {
    if (state.activeChat) {
      app.innerHTML = renderChatDetail();
    } else {
      app.innerHTML = renderChatScreen();
    }
  }

  bindEvents();
}

function renderHeader() {
  const badge = state.connected
    ? `<span class="header-badge badge-online">EN LÍNEA</span>`
    : state.phase === 'qr'
    ? `<span class="header-badge badge-qr">ESCANEAR QR</span>`
    : `<span class="header-badge badge-offline">DESCONECTADO</span>`;

  const notif = state.unreadTotal > 0
    ? `<span class="notif-count">${state.unreadTotal > 99 ? '99+' : state.unreadTotal}</span>`
    : '';

  return `
    <div class="header">
      <span class="header-logo">💬</span>
      <div style="flex:1">
        <div class="header-title">WhatsApp</div>
        <div class="header-sub">GNSIS Hub</div>
      </div>
      ${notif}
      ${badge}
    </div>
  `;
}

function renderQRScreen() {
  const qrContent = state.qrDataUrl
    ? `<img src="${state.qrDataUrl}" alt="QR">`
    : state.error
    ? `<div class="qr-placeholder" style="color:var(--red);font-size:12px;padding:10px;text-align:center">${state.error}</div>`
    : state.phase === 'qr'
    ? `<div class="qr-placeholder"><div class="spinner"></div></div>`
    : `<div class="qr-placeholder">Esperando...</div>`;

  const sessionId = state.sessionId || 'gnsis-main';

  return `
    ${renderHeader()}
    <div class="qr-screen">
      <div class="qr-title">Conectar WhatsApp</div>

      ${state.phase === 'init' ? `
        <div class="qr-input-row">
          <input class="qr-input" id="sessionInput" value="${sessionId}" placeholder="ID sesión">
          <button class="qr-btn" id="connectBtn">Conectar</button>
        </div>
        ${state.boardId ? '' : `
          <div class="qr-input-row" style="margin-top:8px">
            <input class="qr-input" id="boardInput" value="${state.boardId}" placeholder="Board ID (WhatsApp Conversaciones)">
            <button class="qr-btn" id="saveBoardBtn" style="font-size:11px;padding:10px 12px">Guardar</button>
          </div>
        `}
      ` : `
        <div class="qr-box">${qrContent}</div>
        <div class="qr-steps">
          <b>Escanea el QR:</b><br>
          1. Abre WhatsApp → Menú (⋮)<br>
          2. Dispositivos vinculados<br>
          3. Vincular dispositivo<br>
          4. Escanea este código
        </div>
        <div class="qr-status" id="qrStatus">Esperando escaneo...</div>
      `}
    </div>
  `;
}

function renderChatScreen() {
  const items = getFilteredItems();

  const tabs = `
    <div class="tabs">
      <div class="tab ${state.tab === 'recent' ? 'active' : ''}" data-tab="recent">
        <span class="tab-icon">🔔</span>Recientes
      </div>
      <div class="tab ${state.tab === 'all' ? 'active' : ''}" data-tab="all">
        <span class="tab-icon">💬</span>Todos
      </div>
      <div class="tab ${state.tab === 'groups' ? 'active' : ''}" data-tab="groups">
        <span class="tab-icon">👥</span>Grupos
      </div>
    </div>
  `;

  let list = '';
  if (items.length === 0) {
    list = `
      <div class="empty">
        <span class="empty-icon">📭</span>
        <span class="empty-text">${state.boardId ? 'Sin conversaciones aún' : 'Configura el Board ID primero'}</span>
      </div>
    `;
  } else {
    list = items.map(item => {
      const lastUpdate = item.updates?.[0];
      const parsed = lastUpdate ? parseUpdateMessage(lastUpdate) : null;
      const unread = getUnreadCount(item);
      const tipo = getColumnText(item, 'wa_type') || getColumnText(item, 'tipo');
      const isGroup = tipo?.toLowerCase().includes('grupo');
      const initial = isGroup ? '👥' : (item.name?.[0]?.toUpperCase() || '?');
      const time = lastUpdate ? timeAgo(lastUpdate.created_at) : timeAgo(item.updated_at);
      const preview = parsed?.body?.substring(0, 60) || 'Sin mensajes';

      return `
        <div class="msg-item ${unread > 0 ? 'unread' : ''}" data-item-id="${item.id}">
          <div class="msg-avatar">
            ${initial}
            ${unread > 0 ? '<span class="online-dot"></span>' : ''}
          </div>
          <div class="msg-body">
            <div class="msg-top">
              <span class="msg-name">${item.name}</span>
              <span class="msg-time">${time}</span>
            </div>
            <div class="msg-bottom">
              <span class="msg-preview">${preview}</span>
              ${unread > 0 ? `<span class="msg-badge">${unread}</span>` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  const syncInfo = `
    <div class="config-bar">
      <span class="sync-dot"></span>
      <span class="sync-label">Sync nativo Monday.com cada ${CONFIG.POLL_UPDATES / 1000}s</span>
      <button id="refreshBtn">↻ Refrescar</button>
      <button id="configBtn">⚙</button>
    </div>
  `;

  return `
    ${renderHeader()}
    ${tabs}
    <div class="msg-list">${list}</div>
    ${syncInfo}
  `;
}

function renderChatDetail() {
  const item = state.boardItems.find(i => i.id === state.activeChat);
  if (!item) return renderChatScreen();

  const updates = state.messages[item.id] || item.updates || [];
  const parsed = updates.map(parseUpdateMessage).reverse(); // cronológico

  let bubblesHTML = '';
  let lastDate = '';

  for (const msg of parsed) {
    const msgDate = new Date(msg.createdAt).toLocaleDateString('es-MX');
    if (msgDate !== lastDate) {
      const today = new Date().toLocaleDateString('es-MX');
      const yesterday = new Date(Date.now() - 86400000).toLocaleDateString('es-MX');
      const label = msgDate === today ? 'Hoy' : msgDate === yesterday ? 'Ayer' : msgDate;
      bubblesHTML += `<div class="date-pill">${label}</div>`;
      lastDate = msgDate;
    }

    const isSent = msg.isOutgoing || msg.isReply;
    const cls = isSent ? 'sent' : 'recv';
    const time = formatTime(msg.createdAt);
    const ackCls = isSent ? 'read' : '';

    bubblesHTML += `
      <div class="bubble ${cls}">
        ${!isSent && msg.creator !== 'Sistema' ? `<div class="bubble-sender">${msg.creator}</div>` : ''}
        <div>${msg.body}</div>
        <div class="bubble-meta">
          <span class="bubble-time">${time}</span>
          ${isSent ? `<span class="bubble-ack ${ackCls}">✓✓</span>` : ''}
        </div>
      </div>
    `;
  }

  if (parsed.length === 0) {
    bubblesHTML = `<div class="empty"><span class="empty-icon">💬</span><span class="empty-text">Sin mensajes</span></div>`;
  }

  return `
    <div class="chat-detail">
      <div class="chat-header">
        <span class="chat-back" id="backBtn">←</span>
        <div class="msg-avatar" style="width:34px;height:34px;font-size:15px">${item.name?.[0]?.toUpperCase() || '?'}</div>
        <div style="flex:1">
          <div class="chat-name">${item.name}</div>
          <div class="chat-status">Monday.com nativo</div>
        </div>
        <a href="https://gnsis-global.monday.com" target="_blank" style="font-size:11px;color:var(--cyan);text-decoration:none;padding:4px 8px;border:1px solid var(--border);border-radius:4px">Monday ↗</a>
      </div>
      <div class="bubble-list" id="bubbleList">${bubblesHTML}</div>
      <div class="composer">
        <input id="replyInput" placeholder="Responder via Monday.com..." autocomplete="off">
        <button class="send-btn" id="sendBtn" disabled>➤</button>
      </div>
    </div>
  `;
}

// ═══ Filtros ═══
function getFilteredItems() {
  let items = [...state.boardItems];
  if (state.tab === 'recent') {
    // Ordenar por último update, mostrar top 20
    items.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
    items = items.slice(0, 20);
  } else if (state.tab === 'groups') {
    items = items.filter(i => {
      const tipo = getColumnText(i, 'wa_type') || getColumnText(i, 'tipo');
      return tipo?.toLowerCase().includes('grupo');
    });
  }
  return items;
}

function getUnreadCount(item) {
  // Leer de columna o calcular por updates nuevos
  const col = item.column_values?.find(c => c.id === 'wa_unread' || c.id === 'no_le_dos');
  const val = parseInt(col?.text) || 0;
  // También contar updates desde último check
  const newUpdates = (item.updates || []).filter(u => {
    return new Date(u.created_at) > new Date(state.lastUpdateCheck) && !u.body?.includes('[WAHUB]');
  });
  return Math.max(val, newUpdates.length);
}

// ═══ Event Binding ═══
function bindEvents() {
  // QR screen
  document.getElementById('connectBtn')?.addEventListener('click', startConnection);
  document.getElementById('sessionInput')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') startConnection();
  });
  document.getElementById('saveBoardBtn')?.addEventListener('click', () => {
    const input = document.getElementById('boardInput');
    if (input?.value) {
      state.boardId = input.value;
      CONFIG.WA_BOARD_ID = input.value;
      localStorage.setItem('wa_board_id', input.value);
      render();
    }
  });

  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      state.tab = tab.dataset.tab;
      render();
    });
  });

  // Chat items
  document.querySelectorAll('.msg-item').forEach(item => {
    item.addEventListener('click', () => openChat(item.dataset.itemId));
  });

  // Back button
  document.getElementById('backBtn')?.addEventListener('click', () => {
    state.activeChat = null;
    render();
  });

  // Reply
  const replyInput = document.getElementById('replyInput');
  const sendBtn = document.getElementById('sendBtn');
  if (replyInput && sendBtn) {
    replyInput.addEventListener('input', () => {
      sendBtn.disabled = !replyInput.value.trim();
    });
    replyInput.addEventListener('keydown', async e => {
      if (e.key === 'Enter' && replyInput.value.trim()) {
        await handleSendReply();
      }
    });
    sendBtn.addEventListener('click', handleSendReply);
  }

  // Refresh
  document.getElementById('refreshBtn')?.addEventListener('click', () => pollMondayUpdates());

  // Config
  document.getElementById('configBtn')?.addEventListener('click', () => {
    const newId = prompt('Board ID de WhatsApp Conversaciones:', state.boardId);
    if (newId !== null) {
      state.boardId = newId;
      CONFIG.WA_BOARD_ID = newId;
      localStorage.setItem('wa_board_id', newId);
      pollMondayUpdates();
    }
  });

  // Scroll al final en chat
  const bubbleList = document.getElementById('bubbleList');
  if (bubbleList) bubbleList.scrollTop = bubbleList.scrollHeight;
}

// ═══ Acciones ═══
async function startConnection() {
  const input = document.getElementById('sessionInput');
  const sessionId = input?.value?.trim() || 'gnsis-main';
  state.sessionId = sessionId;
  localStorage.setItem('wa_session_id', sessionId);
  state.phase = 'qr';
  state.error = null;
  render();

  // Intentar crear sesión en el Hub
  const result = await createSession(sessionId);
  if (!result.ok && !result.error?.includes('ya existe')) {
    // Verificar si ya está autenticado
    const status = await getSessionStatus(sessionId);
    if (status.ok && status.session?.state === 'ready') {
      state.connected = true;
      state.phase = 'chat';
      render();
      startPolling();
      return;
    }
    state.error = result.error || 'No se pudo conectar al Hub';
    render();
    return;
  }

  // Iniciar polling de QR
  pollQR();
}

async function pollQR() {
  if (state.phase !== 'qr') return;

  const status = await getSessionStatus(state.sessionId);
  if (status.ok && status.session?.state === 'ready') {
    state.connected = true;
    state.phase = 'chat';
    state.qrDataUrl = null;
    render();
    startPolling();
    return;
  }

  const qr = await getQR(state.sessionId);
  if (qr.ok && qr.qr) {
    state.qrDataUrl = qr.qr;
    render();
  }

  setTimeout(pollQR, 3000);
}

async function openChat(itemId) {
  state.activeChat = itemId;

  // Cargar más updates de este item via Monday API nativa
  const updates = await fetchItemUpdates(itemId, 30);
  state.messages[itemId] = updates;

  render();
}

async function handleSendReply() {
  const input = document.getElementById('replyInput');
  const text = input?.value?.trim();
  if (!text || !state.activeChat) return;

  input.value = '';
  document.getElementById('sendBtn').disabled = true;

  const ok = await sendReply(state.activeChat, text);
  if (ok) {
    // Refrescar updates del chat
    const updates = await fetchItemUpdates(state.activeChat, 30);
    state.messages[state.activeChat] = updates;
    render();
  }
}

// ═══ Polling Nativo Monday ═══
let pollTimer = null;

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollMondayUpdates();
  pollTimer = setInterval(pollMondayUpdates, CONFIG.POLL_UPDATES);
}

async function pollMondayUpdates() {
  if (!state.boardId) return;

  const items = await fetchConversations();
  const prevTotal = state.unreadTotal;

  state.boardItems = items;
  state.unreadTotal = items.reduce((sum, item) => sum + getUnreadCount(item), 0);

  // Notificación de escritorio si hay nuevos
  if (state.unreadTotal > prevTotal && document.hidden) {
    try {
      if (Notification.permission === 'granted') {
        const newest = items[0];
        const lastUpdate = newest?.updates?.[0];
        const parsed = lastUpdate ? parseUpdateMessage(lastUpdate) : null;
        new Notification(newest?.name || 'WhatsApp', {
          body: parsed?.body?.substring(0, 80) || 'Nuevo mensaje',
          icon: '💬', tag: 'wahub',
        });
      }
    } catch {}
  }

  // Actualizar título
  if (typeof parent !== 'undefined' && parent !== window) {
    // Estamos en iframe, no cambiar título
  } else {
    document.title = state.unreadTotal > 0
      ? `(${state.unreadTotal}) WhatsApp — GNSIS`
      : 'WhatsApp — GNSIS';
  }

  // Solo re-render si no estamos en detalle o si cambió algo
  if (!state.activeChat) render();

  // También verificar Hub status
  const hubOnline = await checkHubStatus();
  if (state.connected !== hubOnline) {
    state.connected = hubOnline;
    if (!state.activeChat) render();
  }
}

// ═══ Init ═══
async function init() {
  // Pedir permiso notificaciones
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  // Verificar si hay sesión guardada y Hub activo
  if (state.sessionId) {
    const hubOnline = await checkHubStatus();
    if (hubOnline) {
      const status = await getSessionStatus(state.sessionId);
      if (status.ok && status.session?.state === 'ready') {
        state.connected = true;
        state.phase = 'chat';
        render();
        startPolling();
        return;
      }
    }
  }

  // Si tiene boardId pero no Hub, ir directo a modo chat (solo lectura Monday)
  if (state.boardId) {
    state.phase = 'chat';
    render();
    startPolling();
    return;
  }

  state.phase = 'init';
  render();
}

init();
</script>
